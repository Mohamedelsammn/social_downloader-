name: social_downloader
description: "Luminescent Vault - Video Downloader & Manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # DI
  get_it: ^8.0.3

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Storage / files
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # Share
  share_plus: ^10.1.2

  # UI
  google_fonts: ^6.2.1
  video_player: ^2.11.1
  chewie: ^1.13.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
